<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Student Portal | Dr. Amol Thakre</title>
    <meta name="description" content="Student dashboard for course material downloads." />
    <meta name="robots" content="noindex" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Source+Serif+4:opsz,wght@8..60,600;8..60,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index_elite.css" />
    <link rel="stylesheet" href="portal.css" />
</head>
<body class="elite-body">
    <div class="portal-shell">
        <main class="portal-container">
            <div id="portal-config-banner" class="portal-banner" hidden></div>

            <div class="portal-topbar">
                <div class="portal-identity">
                    <h1 id="student-name">Loading…</h1>
                    <span id="track-pill" class="portal-track-pill" hidden></span>
                </div>
                <button id="logout-btn" class="btn-ghost" type="button">Logout</button>
            </div>

            <section id="school-section" class="portal-section" hidden>
                <div class="portal-section-head">
                    <h2>School Course Material (Grade 6–12)</h2>
                    <select id="track-select" class="portal-track-select" hidden></select>
                </div>
                <div id="track-files" class="portal-file-list">
                    <div class="portal-skeleton"></div>
                    <div class="portal-skeleton"></div>
                </div>
            </section>

            <section id="jeeneet-section" class="portal-section" hidden>
                <div class="portal-section-head">
                    <h2>JEE / NEET Preparation</h2>
                    <select id="jeeneet-track-select" class="portal-track-select" hidden></select>
                </div>
                <div id="jeeneet-files" class="portal-file-list">
                    <div class="portal-skeleton"></div>
                    <div class="portal-skeleton"></div>
                </div>
            </section>

            <section class="portal-section">
                <h2>Common Resources</h2>
                <div id="common-files" class="portal-file-list">
                    <div class="portal-skeleton"></div>
                    <div class="portal-skeleton"></div>
                </div>
            </section>
        </main>
    </div>

    <template id="file-row-template">
        <div class="portal-file-row">
            <svg class="portal-file-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <div class="portal-file-meta">
                <div class="portal-file-name"></div>
                <div class="portal-file-sub"></div>
            </div>
            <button type="button" class="btn-outline portal-download-btn">Download</button>
        </div>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="portal.js"></script>
    <script>
        (function () {
            if (!window.Portal) return;

            var LOCAL_MODE = Portal.LOCAL_MODE;

            if (!LOCAL_MODE && !Portal.isConfigured()) {
                Portal.showUnconfiguredBanner();
                return;
            }

            var OPEN_ACCESS = Portal.OPEN_ACCESS;

            function renderFiles(container, files) {
                container.innerHTML = '';
                if (!files.length) {
                    const empty = document.createElement('div');
                    empty.className = 'portal-empty';
                    empty.textContent = "Material will appear here as it's uploaded.";
                    container.appendChild(empty);
                    return;
                }
                const template = document.getElementById('file-row-template');
                files.forEach(function (file) {
                    const node = template.content.cloneNode(true);
                    node.querySelector('.portal-file-name').textContent = file.name;
                    const size = file.metadata ? Portal.formatSize(file.metadata.size) : '';
                    const date = Portal.formatDate(file.created_at || file.updated_at);
                    node.querySelector('.portal-file-sub').textContent = [size, date].filter(Boolean).join(' · ');
                    const btn = node.querySelector('.portal-download-btn');
                    btn.addEventListener('click', async function () {
                        if (file.local) {
                            // No signed URL needed — the file is served straight
                            // from this repo's materials/ folder.
                            const a = document.createElement('a');
                            a.href = file.path;
                            a.download = file.name;
                            document.body.appendChild(a);
                            a.click();
                            a.remove();
                            return;
                        }
                        btn.disabled = true;
                        btn.textContent = '…';
                        const result = await Portal.getDownloadUrl(file.path);
                        btn.disabled = false;
                        btn.textContent = 'Download';
                        if (result.error) {
                            alert('Could not generate download link: ' + result.error);
                            return;
                        }
                        // Programmatic anchor click — unlike async window.open(),
                        // this is not blocked by popup blockers after an await.
                        const a = document.createElement('a');
                        a.href = result.data;
                        a.rel = 'noopener';
                        document.body.appendChild(a);
                        a.click();
                        a.remove();
                    });
                    container.appendChild(node);
                });
            }

            async function loadFilesInto(containerId, track) {
                const listFn = LOCAL_MODE ? Portal.listLocalFiles : Portal.listFiles;
                const result = await listFn(track);
                renderFiles(document.getElementById(containerId), result.data || []);
            }

            async function loadCommonFiles() {
                await loadFilesInto('common-files', 'common');
            }

            function renderPrompt(containerId, text) {
                const container = document.getElementById(containerId);
                container.innerHTML = '';
                const el = document.createElement('div');
                el.className = 'portal-empty';
                el.textContent = text;
                container.appendChild(el);
            }

            // Populates one dropdown with a placeholder "Select..." option — material
            // only loads once the student actually picks a grade, never by default.
            function setupTrackSection(selectEl, sectionEl, containerId, tracks, placeholderText) {
                if (tracks.length === 0) {
                    sectionEl.hidden = true;
                    return;
                }
                sectionEl.hidden = false;
                selectEl.innerHTML = '';

                const placeholder = document.createElement('option');
                placeholder.value = '';
                placeholder.textContent = placeholderText;
                selectEl.appendChild(placeholder);

                tracks.forEach(function (track) {
                    const opt = document.createElement('option');
                    opt.value = track;
                    opt.textContent = Portal.trackLabel(track);
                    selectEl.appendChild(opt);
                });

                selectEl.value = '';
                selectEl.hidden = false;
                selectEl.addEventListener('change', function () {
                    if (selectEl.value) {
                        loadFilesInto(containerId, selectEl.value);
                    } else {
                        renderPrompt(containerId, placeholderText);
                    }
                });
                renderPrompt(containerId, placeholderText);
            }

            async function initOpenAccess() {
                document.getElementById('logout-btn').hidden = true;
                document.getElementById('student-name').textContent = 'Course Material';

                const [schoolResult, jeeNeetResult] = await Promise.all([
                    Portal.listTracks(),
                    Portal.listJeeNeetTracks(),
                ]);

                setupTrackSection(
                    document.getElementById('track-select'),
                    document.getElementById('school-section'),
                    'track-files',
                    schoolResult.data || [],
                    'Select a grade…'
                );
                setupTrackSection(
                    document.getElementById('jeeneet-track-select'),
                    document.getElementById('jeeneet-section'),
                    'jeeneet-files',
                    jeeNeetResult.data || [],
                    'Select a track…'
                );
                await loadCommonFiles();
            }

            async function init() {
                const session = await Portal.requireSession();
                if (!session) return;

                const userId = session.user.id;
                const studentResult = await Portal.loadStudent(userId);

                if (studentResult.error) {
                    document.getElementById('student-name').textContent = 'Unable to load profile';
                    return;
                }

                const student = studentResult.data;
                document.getElementById('student-name').textContent = student.full_name;
                const pill = document.getElementById('track-pill');
                pill.textContent = Portal.trackLabel(student.class_track);
                pill.hidden = false;

                // A logged-in student has exactly one track — show it in whichever
                // section it belongs to, keep the other section's dropdown hidden.
                if (Portal.isJeeNeetTrack(student.class_track)) {
                    document.getElementById('jeeneet-section').hidden = false;
                    await loadFilesInto('jeeneet-files', student.class_track);
                } else {
                    document.getElementById('school-section').hidden = false;
                    await loadFilesInto('track-files', student.class_track);
                }
                await loadCommonFiles();
            }

            document.getElementById('logout-btn').addEventListener('click', function () {
                Portal.logout();
            });

            if (LOCAL_MODE || OPEN_ACCESS) {
                initOpenAccess();
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
