<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Student Portal | Dr. Amol Thakre</title>
    <meta name="description" content="Student dashboard for course material downloads." />
    <meta name="robots" content="noindex" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Source+Serif+4:opsz,wght@8..60,600;8..60,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index_elite.css" />
    <link rel="stylesheet" href="portal.css" />
</head>
<body class="elite-body">
    <div class="portal-shell">
        <main class="portal-container">
            <div id="portal-config-banner" class="portal-banner" hidden></div>

            <div class="portal-topbar">
                <div class="portal-identity">
                    <h1 id="student-name">Loading…</h1>
                    <span id="track-pill" class="portal-track-pill" hidden></span>
                </div>
                <button id="logout-btn" class="btn-ghost" type="button">Logout</button>
            </div>

            <section class="portal-section">
                <h2>Your Course Material</h2>
                <div id="track-files" class="portal-file-list">
                    <div class="portal-skeleton"></div>
                    <div class="portal-skeleton"></div>
                </div>
            </section>

            <section class="portal-section">
                <h2>Common Resources</h2>
                <div id="common-files" class="portal-file-list">
                    <div class="portal-skeleton"></div>
                    <div class="portal-skeleton"></div>
                </div>
            </section>
        </main>
    </div>

    <template id="file-row-template">
        <div class="portal-file-row">
            <svg class="portal-file-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <div class="portal-file-meta">
                <div class="portal-file-name"></div>
                <div class="portal-file-sub"></div>
            </div>
            <button type="button" class="btn-outline portal-download-btn">Download</button>
        </div>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="portal.js"></script>
    <script>
        (function () {
            if (!window.Portal || !Portal.isConfigured()) {
                if (window.Portal) Portal.showUnconfiguredBanner();
                return;
            }

            function renderFiles(container, files) {
                container.innerHTML = '';
                if (!files.length) {
                    const empty = document.createElement('div');
                    empty.className = 'portal-empty';
                    empty.textContent = "Material will appear here as it's uploaded.";
                    container.appendChild(empty);
                    return;
                }
                const template = document.getElementById('file-row-template');
                files.forEach(function (file) {
                    const node = template.content.cloneNode(true);
                    node.querySelector('.portal-file-name').textContent = file.name;
                    const size = file.metadata ? Portal.formatSize(file.metadata.size) : '';
                    const date = Portal.formatDate(file.created_at || file.updated_at);
                    node.querySelector('.portal-file-sub').textContent = [size, date].filter(Boolean).join(' · ');
                    const btn = node.querySelector('.portal-download-btn');
                    btn.addEventListener('click', async function () {
                        btn.disabled = true;
                        btn.textContent = '…';
                        const result = await Portal.getDownloadUrl(file.path);
                        btn.disabled = false;
                        btn.textContent = 'Download';
                        if (result.error) {
                            alert('Could not generate download link: ' + result.error);
                            return;
                        }
                        // Programmatic anchor click — unlike async window.open(),
                        // this is not blocked by popup blockers after an await.
                        const a = document.createElement('a');
                        a.href = result.data;
                        a.rel = 'noopener';
                        document.body.appendChild(a);
                        a.click();
                        a.remove();
                    });
                    container.appendChild(node);
                });
            }

            async function init() {
                const session = await Portal.requireSession();
                if (!session) return;

                const userId = session.user.id;
                const studentResult = await Portal.loadStudent(userId);

                if (studentResult.error) {
                    document.getElementById('student-name').textContent = 'Unable to load profile';
                    return;
                }

                const student = studentResult.data;
                document.getElementById('student-name').textContent = student.full_name;
                const pill = document.getElementById('track-pill');
                pill.textContent = Portal.trackLabel(student.class_track);
                pill.hidden = false;

                const [trackResult, commonResult] = await Promise.all([
                    Portal.listFiles(student.class_track),
                    Portal.listFiles('common'),
                ]);

                renderFiles(document.getElementById('track-files'), trackResult.data || []);
                renderFiles(document.getElementById('common-files'), commonResult.data || []);
            }

            document.getElementById('logout-btn').addEventListener('click', function () {
                Portal.logout();
            });

            init();
        })();
    </script>
</body>
</html>
