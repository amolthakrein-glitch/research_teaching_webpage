<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dr. A. K. Thakre Academy</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script type="text/babel" src="ds-runtime.jsx"></script>
<style>
  html, body { margin: 0; background: var(--bg-page); }
  body { font-family: var(--font-body); color: var(--text-body); }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="SiteChrome.jsx"></script>
<script type="text/babel" src="Home.jsx"></script>
<script type="text/babel" src="Research.jsx"></script>
<script type="text/babel" src="Coaching.jsx"></script>
<script type="text/babel" src="Register.jsx"></script>

<script type="text/babel" data-presets="react">
  function App() {
    const Header = window.Header, Footer = window.Footer;
    const [page, setPage] = React.useState('home');

    const onNav = (p) => { setPage(p); window.scrollTo({ top: 0, behavior: 'instant' }); };

    React.useEffect(() => {
      if (window.lucide) window.lucide.createIcons();
    });

    const Page = {
      home: window.Home,
      research: window.ResearchPage,
      coaching: window.CoachingPage,
      register: window.RegisterPage,
    }[page];

    return (
      <React.Fragment>
        <Header page={page} onNav={onNav} />
        <main>{Page ? <Page onNav={onNav} /> : null}</main>
        <Footer onNav={onNav} />
      </React.Fragment>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);

  // Repaint Lucide icons whenever the DOM changes (filter toggles, form
  // success, page switches) — child-state re-renders don't hit App's effect.
  (function () {
    let queued = false;
    const repaint = () => {
      queued = false;
      if (window.lucide) window.lucide.createIcons();
    };
    const obs = new MutationObserver(() => {
      if (queued) return;
      queued = true;
      requestAnimationFrame(repaint);
    });
    obs.observe(document.getElementById('root'), { childList: true, subtree: true });
  })();
</script>
</body>
</html>
